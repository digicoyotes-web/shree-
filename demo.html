<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shree Hospital Karad - About Us</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* CSS reset to ensure consistent margins/padding */
        body, h1, p {
            margin: 0;
            padding: 0;
        }

        /* Set the overall font for the page */
        body {
            font-family: 'Poppins', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Main Container: This will contain the background image and overlay */
        .about-shree {
            position: relative;
            width: 100%;
           height: 300px; /* Set to 100% of the viewport height, adjust as needed (e.g., 60vh) */
            min-height: 350px; /* Ensures a minimum size if the viewport is very small */
            
            /* Background image setup */
            background-image: url('https://png.pngtree.com/thumb_back/fh260/background/20240912/pngtree-doctor-holding-clipboard-in-hospital-corridor-medical-stock-photo-image_16150320.jpg'); /* Placeholder: replace this with your hospital image URL */
            background-size: cover; /* Ensures the entire area is covered by the image */
            background-position: center center; /* Centers the image */
            background-repeat: no-repeat;
            
            /* Standard alignment and spacing */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden; /* Important to contain the pseudo-element overlay */
        }

        /* Color Overlay to ensure text legibility (Matches the original background color) */
        .about-shree::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Semi-transparent version of the original teal-green color */
            background-color: rgba(18, 147, 114, 0.85); /* rgba(R, G, B, Opacity) */
            z-index: 1; /* Places the overlay above the image and below the content */
        }

        /* Content Wrapper: Contains the text blocks and places them above the overlay */
        .content-container {
            position: relative;
            z-index: 2; /* Important: Must be higher than the pseudo-element overlay's z-index */
            max-width: 1000px; /* Limits the content width for readability */
            padding: 4rem 2rem; /* Vertical and horizontal padding */
            color: #ffffff; /* Sets text to white for high contrast */
        }

        /* Title Styling */
        .about-shree h1 {
            font-size: 3.5rem; /* Large font size for impact */
            font-weight: 600; /* Bold weight */
            letter-spacing: -0.5px; /* Slight letter spacing adjustment for better look */
            margin-bottom: 2rem; /* Spacing below the title */
        }

        /* Original Description Styling */
        .description {
            font-size: 1.125rem; /* Larger than default paragraph text */
            font-weight: 400; /* Regular weight */
            line-height: 1.7; /* Increases line height for better readability */
            opacity: 0.95; /* Slight reduction in opacity for a softer look */
            margin-bottom: 2.5rem; /* Spacing below the description and above the Fun Fact */
        }

        /* Special Styling for the Fun Fact Text */
        .fun-fact {
            font-size: 1.3rem; /* Visually distinct but not larger than the description */
            font-weight: 600; /* Bold weight for emphasis */
            color: #ffffff; /* Keeps it white, but you could use a slightly different color if desired */
            letter-spacing: 0.2px; /* Slight positive spacing for punch */
            line-height: 1.4; /* Tighter line-height for a punchier statement */
        }

        /* Add simple responsiveness to adjust for smaller screens */
        @media (max-width: 768px) {
            .about-shree {
                height: auto; /* Allow content to dictate height on mobile */
                padding: 5rem 1rem; /* Adjust padding for smaller screens */
            }
            .about-shree h1 {
                font-size: 2.5rem; /* Reduce title size on mobile */
                margin-bottom: 1.5rem;
            }
            .description {
                font-size: 1rem; /* Adjust paragraph size on mobile */
                margin-bottom: 2rem;
            }
            .fun-fact {
                font-size: 1.15rem; /* Adjust fun fact size on mobile */
            }
        }
    </style>
</head>
<body>

    <section class="about-shree">
        <div class="content-container">
            <h1>About Shree Hospital Karad</h1>
            <p class="description">
                Delivering trusted, compassionate, and advanced healthcare services in Karad with a commitment to excellence and patient safety.
            </p>
           
        </div>
    </section>

</body>
</html>
